<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>الصفحة غير موجودة · تاي لي</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#B91C1C" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Tajawal",system-ui,sans-serif;background:#140a0a;color:#F6EBE2;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden}
  .wrap{max-width:520px;position:relative;z-index:2}
  .glow{position:fixed;inset:0;background:radial-gradient(60% 50% at 50% 35%,rgba(185,28,28,.3),transparent 60%);z-index:0}
  svg.wok{width:120px;height:auto;margin-inline:auto;display:block;filter:drop-shadow(0 16px 24px rgba(0,0,0,.5))}
  h1{font-family:"El Messiri",sans-serif;font-size:clamp(3.4rem,16vw,6rem);color:#FCD34D;line-height:1;margin:18px 0 6px}
  h2{font-family:"El Messiri",sans-serif;font-size:1.5rem;margin-bottom:12px}
  p{color:#D8C3B6;margin-bottom:26px}
  a.btn{display:inline-flex;align-items:center;gap:9px;background:#DC2626;color:#fff;font-weight:700;
    padding:14px 26px;border-radius:999px;font-family:"El Messiri",sans-serif;
    box-shadow:0 10px 26px -10px rgba(220,38,38,.7);transition:transform .16s ease}
  a.btn:active{transform:scale(.97)}
  a.btn:focus-visible{outline:3px solid #FCD34D;outline-offset:3px}
</style>
</head>
<body>
<div class="glow" aria-hidden="true"></div>
<div class="wrap">
  <svg class="wok" viewBox="0 0 120 90" aria-hidden="true">
    <path d="M18 36c0 20 19 34 42 34s42-14 42-34" fill="none" stroke="#FCD34D" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="60" cy="36" rx="42" ry="10" fill="#7F1D1D"/>
    <path d="M48 22c2-8 6-12 10-12M62 22c1-9 5-13 9-14" fill="none" stroke="#FDE68A" stroke-width="3" stroke-linecap="round"/>
  </svg>
  <h1>404</h1>
  <h2>هذه الصفحة غير موجودة</h2>
  <p>يبدو أن الطبق الذي تبحث عنه ليس في القائمة. عُد إلى الصفحة الرئيسية واستعرض نكهات تاي لي.</p>
  <a class="btn" href="./">العودة للرئيسية</a>
</div>
</body>
</html>
